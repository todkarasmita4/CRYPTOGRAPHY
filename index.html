<!DOCTYPE html>
<html>
<head>
  <title>Crypto Lab Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🔐 Cryptography Virtual Lab</h1>
<p>Select a cipher → Enter values → Simulate encryption</p>

<div class="container">

  <!-- CIPHER SELECT -->
  <select id="cipherSelect" onchange="showInfo()">
    <option value="caesar">Caesar Cipher</option>
    <option value="vigenere">Vigenere Cipher</option>
    <option value="rail">Rail Fence Cipher</option>
    <option value="playfair">Playfair Cipher</option>
    <option value="rsa">RSA</option>
    <option value="diffie">Diffie-Hellman</option>
  </select>

  <!-- INPUTS -->
  <input id="inputText" placeholder="Enter plaintext / message">
  <input id="inputKey" placeholder="Enter key / parameters">

  <button onclick="runCipher()">Run Simulation</button>

  <h3>Result:</h3>
  <p id="output"></p>

  <hr>

  <!-- INFO SECTION -->
  <div id="infoBox">
    <h2>About Cipher</h2>
    <p id="description"></p>
    <p><b>Steps:</b> <span id="steps"></span></p>
    <p><b>Formula:</b> <span id="formula"></span></p>
    <p><b>Applications:</b> <span id="applications"></span></p>
  </div>

</div>

<!-- Scripts -->
<script src="ciphers/caesar.js"></script>
<script src="ciphers/vigenere.js"></script>
<script src="ciphers/railfence.js"></script>
<script src="ciphers/playfair.js"></script>
<script src="ciphers/rsa.js"></script>
<script src="ciphers/diffie.js"></script>
<script src="script.js"></script>

</body>
</html>
