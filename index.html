<!DOCTYPE html>
<html>
<head>
  <title>CipherSphere</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h2>🔐 CipherSphere</h2>
</nav>

<section class="hero">
  <h1>Cryptography Virtual Lab</h1>
  <p>Explore encryption & decryption in an interactive way</p>
</section>

<div class="main">

  <!-- SIMULATOR -->
  <div class="card">

    <h2>🧪 Simulator</h2>

    <select id="cipherSelect" onchange="showInfo()">
      <option value="caesar">Caesar</option>
      <option value="vigenere">Vigenere</option>
      <option value="rail">Rail Fence</option>
      <option value="playfair">Playfair</option>
      <option value="rsa">RSA</option>
      <option value="diffie">Diffie-Hellman</option>
    </select>

    <select id="mode">
      <option value="enc">Encrypt</option>
      <option value="dec">Decrypt</option>
    </select>

    <input id="inputText" placeholder="Enter text">
    <input id="inputKey" placeholder="Enter key / parameters">

    <button onclick="runCipher()">Run Simulation</button>

    <div class="result-box">
      <p id="output">Result will appear here...</p>
      <div id="status"></div>
    </div>

  </div>

  <!-- INFO -->
  <div class="card info">

    <h2>📚 Cipher Info</h2>

    <p id="description"></p>

    <p><b>Steps:</b><br><span id="steps"></span></p>

    <p><b>Formula:</b><br><span id="formula"></span></p>

    <p><b>Applications:</b><br><span id="applications"></span></p>

  </div>

</div>

<footer>
  <p>Built for CNS Lab • CipherSphere</p>
</footer>

<script src="ciphers/caesar.js"></script>
<script src="ciphers/vigenere.js"></script>
<script src="ciphers/railfence.js"></script>
<script src="ciphers/playfair.js"></script>
<script src="ciphers/rsa.js"></script>
<script src="ciphers/diffie.js"></script>
<script src="script.js"></script>

</body>
</html>
