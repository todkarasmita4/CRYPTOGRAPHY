<!DOCTYPE html>
<html>
<head>
  <title>CipherSphere</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<header>
  <h1>CipherSphere</h1>
  <button id="toggle">🌙</button>
</header>

<section class="hero">
  <h2>Cryptography, Reimagined</h2>
  <p>Elegant. Interactive. Understandable.</p>
</section>

<section class="cards">

  <div class="card" onclick="openLab('caesar')">
    <h3>Caesar Cipher</h3>
    <span>Shift Cipher</span>
  </div>

  <div class="card" onclick="openLab('vigenere')">
    <h3>Vigenère Cipher</h3>
    <span>Keyword Cipher</span>
  </div>

  <div class="card" onclick="openLab('rail')">
    <h3>Rail Fence</h3>
    <span>Transposition</span>
  </div>

  <div class="card" onclick="openLab('playfair')">
    <h3>Playfair Cipher</h3>
    <span>Matrix Based</span>
  </div>

</section>

<!-- MODAL -->
<div id="lab" class="lab hidden">
  <div class="lab-box">

    <span class="close" onclick="closeLab()">✕</span>

    <h2 id="labTitle"></h2>

    <h4>Description</h4>
    <p id="desc"></p>

    <h4>Steps</h4>
    <ol id="steps"></ol>

    <input id="text" placeholder="Enter text">
    <input id="key" placeholder="Enter key">

    <div class="buttons">
      <button onclick="run('enc')">Encrypt</button>
      <button onclick="run('dec')">Decrypt</button>
    </div>

    <div id="output"></div>

  </div>
</div>

<script src="ciphers/caesar.js"></script>
<script src="ciphers/vigenere.js"></script>
<script src="ciphers/railfence.js"></script>
<script src="ciphers/playfair.js"></script>
<script src="script.js"></script>

</body>
</html>
