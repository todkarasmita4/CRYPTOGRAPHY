<!DOCTYPE html>
<html>
<head>
  <title>CipherSphere</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>CipherSphere</h1>
  <button id="toggle">🌙</button>
</header>

<section class="hero">
  <h2>Cryptography, Reimagined</h2>
  <p>Elegant. Interactive. Intelligent.</p>
</section>

<section class="cards">
  <div class="card" onclick="openInfo('caesar')">Caesar</div>
  <div class="card" onclick="openInfo('vigenere')">Vigenère</div>
  <div class="card" onclick="openInfo('playfair')">Playfair</div>
  <div class="card" onclick="openInfo('railfence')">Rail Fence</div>
  <div class="card" onclick="openInfo('rsa')">RSA</div>
  <div class="card" onclick="openInfo('diffie')">Diffie</div>
</section>

<section id="infoPage" class="hidden">
  <div class="glass">

    <span class="back" onclick="goBack()">← Back</span>

    <h2 id="title"></h2>
    <p id="desc"></p>

    <h3>Steps</h3>
    <ul id="steps"></ul>

    <h3>Visualization</h3>
    <div id="visual"></div>

    <h3>Simulator</h3>
    <input id="text" placeholder="Enter text">
    <input id="key" placeholder="Enter key">

    <div class="btns">
      <button onclick="runEncrypt()">Encrypt</button>
      <button onclick="runDecrypt()">Decrypt</button>
    </div>

    <div id="output"></div>

    <p id="fun"></p>

  </div>
</section>

<script src="ciphers/caesar.js"></script>
<script src="ciphers/vigenere.js"></script>
<script src="ciphers/railfence.js"></script>
<script src="ciphers/playfair.js"></script>
<script src="ciphers/rsa.js"></script>
<script src="ciphers/diffie.js"></script>

<script src="script.js"></script>

</body>
</html>
