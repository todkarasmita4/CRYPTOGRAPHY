<!DOCTYPE html>
<html>
<head>
  <title>CryptoQuest</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎮 CryptoQuest</h1>
<p>Game + Simulation for Cryptography</p>

<div class="game-box">

  <!-- GAME SECTION -->
  <h2>🎯 Game Mode</h2>

  <h3 id="question">Loading...</h3>

  <p id="hint">💡 Hint: ???</p>

  <button onclick="showHint()">Show Hint (-5 pts)</button>
  <button onclick="skipQuestion()">Skip</button>

  <br><br>

  <input id="answer" placeholder="Enter answer">

  <button onclick="checkAnswer()">Submit</button>

  <p id="feedback"></p>

  <h4>🏆 Score: <span id="score">0</span></h4>
  <h4>🔥 Streak: <span id="streak">0</span></h4>

  <hr>

  <!-- SIMULATION SECTION -->
  <h2>🧪 Simulation Mode</h2>

  <select id="simCipher">
    <option value="caesar">Caesar</option>
    <option value="vigenere">Vigenere</option>
    <option value="rail">Rail Fence</option>
    <option value="playfair">Playfair</option>
    <option value="rsa">RSA</option>
    <option value="diffie">Diffie-Hellman</option>
  </select>

  <input id="simText" placeholder="Enter plaintext">
  <input id="simKey" placeholder="Enter key / parameters">

  <button onclick="runSimulation()">Encrypt</button>

  <p><b>Result:</b> <span id="simResult"></span></p>

</div>

<!-- Cipher files -->
<script src="ciphers/caesar.js"></script>
<script src="ciphers/vigenere.js"></script>
<script src="ciphers/railfence.js"></script>
<script src="ciphers/playfair.js"></script>
<script src="ciphers/rsa.js"></script>
<script src="ciphers/diffie.js"></script>

<script src="script.js"></script>

</body>
</html>
