<!DOCTYPE html>
<html>
<head>
  <title>CipherSphere</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>CipherSphere</h1>
  <button id="toggle">☾</button>
</header>

<section class="hero">
  <h2>Cryptography, Reimagined</h2>
  <p>Explore encryption as an experience</p>
</section>

<section class="cards">

  <div class="card" onclick="openLab('caesar')">
    <h3>Caesar</h3>
    <p>Shift-based encryption</p>
  </div>

  <div class="card" onclick="openLab('vigenere')">
    <h3>Vigenère</h3>
    <p>Keyword cipher</p>
  </div>

  <div class="card" onclick="openLab('rail')">
    <h3>Rail Fence</h3>
    <p>Zig-zag pattern</p>
  </div>

  <div class="card" onclick="openLab('playfair')">
    <h3>Playfair</h3>
    <p>Pair encryption</p>
  </div>

  <div class="card" onclick="openLab('rsa')">
    <h3>RSA</h3>
    <p>Public key system</p>
  </div>

  <div class="card" onclick="openLab('diffie')">
    <h3>Diffie</h3>
    <p>Key exchange</p>
  </div>

</section>

<!-- MODAL LAB -->
<div id="lab" class="lab hidden">

  <div class="lab-box">
    <span onclick="closeLab()">✕</span>

    <h2 id="labTitle"></h2>

    <input id="text" placeholder="Enter text">
    <input id="key" placeholder="Enter key">

    <div class="buttons">
      <button onclick="run('enc')">Encrypt</button>
      <button onclick="run('dec')">Decrypt</button>
    </div>

    <div id="output"></div>

  </div>

</div>

<script src="ciphers/caesar.js"></script>
<script src="ciphers/vigenere.js"></script>
<script src="ciphers/railfence.js"></script>
<script src="ciphers/playfair.js"></script>
<script src="ciphers/rsa.js"></script>
<script src="ciphers/diffie.js"></script>
<script src="script.js"></script>

</body>
</html>
