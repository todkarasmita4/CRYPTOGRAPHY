<!DOCTYPE html>
<html>
<head>
  <title>CipherSphere</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>CipherSphere</h1>
  <button id="themeToggle">🌙</button>
</header>

<main>

  <!-- HERO -->
  <section class="hero">
    <h2>Cryptography Virtual Lab</h2>
    <p>Visualize • Simulate • Learn</p>
  </section>

  <!-- CARDS -->
  <section class="grid">
    <div class="card" onclick="openPanel('caesar')">Caesar</div>
    <div class="card" onclick="openPanel('vigenere')">Vigenère</div>
    <div class="card" onclick="openPanel('rail')">Rail Fence</div>
    <div class="card" onclick="openPanel('playfair')">Playfair</div>
    <div class="card" onclick="openPanel('rsa')">RSA</div>
    <div class="card" onclick="openPanel('diffie')">Diffie</div>
  </section>

  <!-- SIMULATOR -->
  <section class="simulator">
    <h3>Simulator</h3>

    <select id="cipher"></select>

    <div class="inputs">
      <input id="text" placeholder="Enter text">
      <input id="key" placeholder="Enter key">
    </div>

    <div class="buttons">
      <button onclick="run('enc')">Encrypt</button>
      <button onclick="run('dec')">Decrypt</button>
    </div>

    <div class="output" id="output">Output will appear here</div>
  </section>

</main>

<!-- SIDE PANEL -->
<div id="panel" class="panel hidden">
  <button onclick="closePanel()">✖</button>
  <h2 id="pTitle"></h2>
  <p id="pDesc"></p>
  <p id="pSteps"></p>
  <p id="pFormula"></p>
  <p id="pApp"></p>
</div>

<script src="ciphers/caesar.js"></script>
<script src="ciphers/vigenere.js"></script>
<script src="ciphers/railfence.js"></script>
<script src="ciphers/playfair.js"></script>
<script src="ciphers/rsa.js"></script>
<script src="ciphers/diffie.js"></script>
<script src="script.js"></script>

</body>
</html>
