<!DOCTYPE html>
<html>
<head>
  <title>CipherSphere</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h2>🔐 CipherSphere</h2>
  <button onclick="toggleMode()">🌗</button>
</nav>

<!-- HOME PAGE -->
<section id="home">

  <div class="hero">
    <h1>Cryptography Virtual Lab</h1>
    <p>Interactive simulation of encryption techniques</p>
  </div>

  <!-- CIPHER CARDS -->
  <h2 class="section-title">Ciphering Techniques</h2>

  <div class="cards">
    <div class="card" onclick="openInfo('caesar')">Caesar</div>
    <div class="card" onclick="openInfo('vigenere')">Vigenere</div>
    <div class="card" onclick="openInfo('rail')">Rail Fence</div>
    <div class="card" onclick="openInfo('playfair')">Playfair</div>
    <div class="card" onclick="openInfo('rsa')">RSA</div>
    <div class="card" onclick="openInfo('diffie')">Diffie</div>
  </div>

  <!-- SIMULATOR -->
  <div class="simulator">
    <h2>🧪 Simulator</h2>

    <select id="cipherSelect"></select>

    <select id="mode">
      <option value="enc">Encrypt</option>
      <option value="dec">Decrypt</option>
    </select>

    <input id="inputText" placeholder="Enter text">
    <input id="inputKey" placeholder="Enter key / parameters">

    <button onclick="runCipher()">Run</button>

    <p id="output"></p>
    <div id="status"></div>
  </div>

</section>

<!-- INFO PAGE -->
<section id="infoPage" class="hidden">
  <button onclick="goHome()">⬅ Back</button>

  <h1 id="infoTitle"></h1>
  <p id="description"></p>

  <h3>Steps</h3>
  <p id="steps"></p>

  <h3>Formula</h3>
  <p id="formula"></p>

  <h3>Applications</h3>
  <p id="applications"></p>
</section>

<script src="ciphers/caesar.js"></script>
<script src="ciphers/vigenere.js"></script>
<script src="ciphers/railfence.js"></script>
<script src="ciphers/playfair.js"></script>
<script src="ciphers/rsa.js"></script>
<script src="ciphers/diffie.js"></script>
<script src="script.js"></script>

</body>
</html>
